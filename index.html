<!DOCTYPE html>

<head>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDN (v18) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Google Fonts (Plus Jakarta Sans) -->

<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div id="root"></div>

  <!-- Aplikasi React Utama -->
  <script type="text/babel" data-type="module" data-presets="classic-react">
    // Import Modul Firebase secara Asinkron
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Deklarasi Hooks React dari cakupan global window
    const { useState, useEffect, useRef } = window.React;

    // Definisi User ID Anonim khusus yang digunakan untuk bypass
    const DEFAULT_ANONYMOUS_UID = "Rp822a7tz8NS7L5oQRdsbMACIn22";

    // Konfigurasi Global Variabel dari Environment dengan penanganan defensif (anti crash)
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'absenguru';
    const firebaseConfig = typeof __firebase_config !== 'undefined' 
      ? (typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config)
      : {
          apiKey: "AIzaSyB3875lwr2R94c0CF65KRiTBq8F5glvs1s",
          authDomain: "absenguru-354d6.firebaseapp.com",
          databaseURL: "https://absenguru-354d6-default-rtdb.firebaseio.com",
          projectId: "absenguru-354d6",
          storageBucket: "absenguru-354d6.firebasestorage.app",
          messagingSenderId: "48673562988",
          appId: "1:48673562988:web:5ebd3455062281055ad349",
          measurementId: "G-0G85P2CB7X"
        };

    // Inisialisasi Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Template data sekolah awal yang otomatis dipopulasikan ke cloud jika tabel/koleksi kosong
    const TEMPLATE_GURU = [
      { nama: "MUHAMMAD LUTFI, S.Pd.", nip: "19920815 202012 1 002", mapel: "Pemrograman Web & Perangkat Bergerak" },
      { nama: "DEWI SARTIKA, M.Pd.", nip: "19850312 201101 2 004", mapel: "Bahasa Indonesia & Literasi" },
      { nama: "BAMBANG SUDJATMOKO, S.T.", nip: "19780922 200502 1 001", mapel: "Sistem Komputer & Jaringan" },
      { nama: "SITI AMINAH, S.Si.", nip: "19891104 201803 2 009", mapel: "Matematika Terapan & Statistika" }
    ];

    const TEMPLATE_KELAS = [
      { nama: "X-RPL-1", deskripsi: "Rekayasa Perangkat Lunak - Kelas 10 A" },
      { nama: "X-RPL-2", deskripsi: "Rekayasa Perangkat Lunak - Kelas 10 B" },
      { nama: "XI-RPL-1", deskripsi: "Rekayasa Perangkat Lunak - Kelas 11 A" },
      { nama: "XI-RPL-2", deskripsi: "Rekayasa Perangkat Lunak - Kelas 11 B" },
      { nama: "XII-RPL-1", deskripsi: "Rekayasa Perangkat Lunak - Kelas 12 A" },
      { nama: "XII-RPL-2", deskripsi: "Rekayasa Perangkat Lunak - Kelas 12 B" }
    ];

    function App() {
      // State Otentikasi User Firebase
      const [user, setUser] = useState(null);
      const [isCloudConnected, setIsCloudConnected] = useState(false);
      const [isFileProtocol, setIsFileProtocol] = useState(false);

      // State Debugger Koneksi Cloud
      const [cloudStatus, setCloudStatus] = useState("Menghubungkan...");
      const [cloudError, setCloudError] = useState("");
      const [hasPermissionError, setHasPermissionError] = useState(false);

      // State Login & Sesi Role
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [userRole, setUserRole] = useState(null); // 'guru' | 'admin'
      const [guruProfile, setGuruProfile] = useState(null); // Menyimpan info profile guru aktif
      
      // Form Login State
      const [loginTab, setLoginTab] = useState('guru'); // 'guru' | 'admin'
      const [selectedGuruIndex, setSelectedGuruIndex] = useState(0);
      const [inputPassword, setInputPassword] = useState('');
      const [adminUsername, setAdminUsername] = useState('');
      const [loginError, setLoginError] = useState('');

      // State Daftar Guru & Kelas Dinamis (Diisi secara realtime dari cloud)
      const [teachers, setTeachers] = useState([]);
      const [classes, setClasses] = useState([]);

      // State Utama Alur Absensi Guru
      const [step, setStep] = useState('welcome'); // 'welcome' | 'photo' | 'location' | 'rekap' | 'success'
      const [absenType, setAbsenType] = useState('masuk'); // 'masuk' | 'pulang'
      const [photoData, setPhotoData] = useState(null);
      const [location, setLocation] = useState(null);
      const [address, setAddress] = useState("");
      const [locationStatus, setLocationStatus] = useState("idle"); // 'idle' | 'fetching' | 'success' | 'error'
      const [loadingSubmit, setLoadingSubmit] = useState(false);
      const [showHistory, setShowHistory] = useState(false);
      const [isSyncing, setIsSyncing] = useState(true);
      
      // State Laporan Jurnal Kinerja Harian
      const [jurnalActivity, setJurnalActivity] = useState("");
      const [jurnalClass, setJurnalClass] = useState("");

      // Ref untuk Kamera
      const videoRef = useRef(null);
      const streamRef = useRef(null);

      // Koordinat Sekolah Default (Pare, Kediri)
      const SCHOOL_LAT = -7.771234; 
      const SCHOOL_LNG = 112.195678;
      const MAX_DISTANCE_METER = 100; 
      const [distance, setDistance] = useState(null);
      const [isInsideArea, setIsInsideArea] = useState(false);

      // Data Absensi untuk Struk Sukses
      const [receiptData, setReceiptData] = useState(null);

      // Riwayat Absensi murni dari Cloud Firestore
      const [history, setHistory] = useState([]);

      // State UI Admin Dashboard
      const [adminTab, setAdminTab] = useState('absen'); // 'absen' | 'guru' | 'kelas'
      const [adminSearchTerm, setAdminSearchTerm] = useState('');
      const [adminFilterType, setAdminFilterType] = useState('ALL'); // 'ALL' | 'MASUK' | 'PULANG'
      const [selectedPhotoModal, setSelectedPhotoModal] = useState(null);

      // State Formulir Tambah Guru Baru
      const [newTeacherName, setNewTeacherName] = useState('');
      const [newTeacherNip, setNewTeacherNip] = useState('');
      const [newTeacherMapel, setNewTeacherMapel] = useState('');
      const [loadingAddTeacher, setLoadingAddTeacher] = useState(false);

      // State Formulir Tambah/Edit Kelas Baru
      const [newClassName, setNewClassName] = useState('');
      const [newClassDesc, setNewClassDesc] = useState('');
      const [editingClass, setEditingClass] = useState(null); // Menyimpan objek kelas yang sedang diedit
      const [loadingAddClass, setLoadingAddTeacherClass] = useState(false);

      // State Notifikasi / Toast Kustom
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

      // State Modal Konfirmasi Kustom (Mengganti window.confirm)
      const [confirmModal, setConfirmModal] = useState({ show: false, title: '', message: '', type: '', data: null });

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
      };

      // Pemicu Modal Konfirmasi Kustom yang Baru & Aman
      const triggerConfirmation = (title, message, type, data) => {
        setConfirmModal({
          show: true,
          title,
          message,
          type,
          data
        });
      };

      // Eksekusi Konfirmasi Hapus berdasarkan Type & Data
      const handleConfirmAction = async () => {
        const { type, data } = confirmModal;
        
        // Tutup modal terlebih dahulu
        setConfirmModal({ show: false, title: '', message: '', type: '', data: null });

        if (!data || !data.id) return;

        if (!isCloudConnected) {
          showToast("Gagal memproses. Aplikasi sedang dalam mode luring / offline.", "error");
          return;
        }

        try {
          if (type === 'delete_guru') {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'daftar_guru', data.id);
            await deleteDoc(docRef);
            showToast(`Guru "${data.nama}" berhasil dihapus dari cloud.`, "success");
          } 
          else if (type === 'delete_kelas') {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'daftar_kelas', data.id);
            await deleteDoc(docRef);
            showToast(`Kelas "${data.nama}" berhasil dihapus dari cloud.`, "success");
            if (editingClass && editingClass.id === data.id) {
              cancelEditClass();
            }
          } 
          else if (type === 'delete_log') {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'absen_history', data.id);
            await deleteDoc(docRef);
            showToast("Log absensi berhasil dihapus permanent.", "success");
          }
        } catch (error) {
          console.warn("Gagal mengeksekusi aksi hapus cloud:", error);
          showToast("Gagal memproses aksi hapus pada server database cloud.", "error");
        }
      };

      // --- OTENTIKASI & DETEKSI PROTOKOL LOKAL (Rule 3) ---
      useEffect(() => {
        if (window.location.protocol === 'file:') {
          setIsFileProtocol(true);
        }

        const initAuth = async () => {
          try {
            // Rule 3 - Jalankan autentikasi terlebih dahulu secara berurutan
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
            setIsCloudConnected(true);
            setCloudStatus("Sukses Terhubung");
            console.log("Firebase Auth berhasil terhubung secara anonim.");
          } catch (error) {
            console.warn("Autentikasi Firebase dibatasi atau belum dikonfigurasi:", error.message);
            setCloudStatus("Gagal Terhubung");
            setCloudError("Auth Error: " + error.message);
            
            // Bypass menggunakan Custom Anonymous UID fallback
            setUser({ uid: DEFAULT_ANONYMOUS_UID, displayName: "Guru (Bypass)" });
            setIsCloudConnected(true);
            setIsSyncing(false);
          }
        };

        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (usr) => {
          if (usr) {
            setUser(usr);
            setIsCloudConnected(true);
            setCloudStatus("Sukses Terhubung");
          }
        });

        const savedSession = localStorage.getItem('absen_session');
        if (savedSession) {
          const session = JSON.parse(savedSession);
          setIsLoggedIn(true);
          setUserRole(session.role);
          if (session.role === 'guru') {
            setGuruProfile(session.profile);
          }
        }

        return () => unsubscribe();
      }, []);

      // --- SINKRONISASI DATA REALTIME FIRESTORE (Rule 1 & Rule 2) ---
      useEffect(() => {
        // Rule 3 - Lindungi semua operasi Firestore agar hanya berjalan jika user sudah terotentikasi
        if (!user || !isCloudConnected) {
          return;
        }

        setIsSyncing(true);

        const logCollection = collection(db, 'artifacts', appId, 'public', 'data', 'absen_history');
        const teachersCollection = collection(db, 'artifacts', appId, 'public', 'data', 'daftar_guru');
        const classesCollection = collection(db, 'artifacts', appId, 'public', 'data', 'daftar_kelas');

        // 1. LANGGANAN REAL-TIME LOG ABSENSI
        const unsubscribeLogs = onSnapshot(logCollection, 
          (snapshot) => {
            const records = [];
            snapshot.forEach((doc) => {
              records.push({ id: doc.id, ...doc.data() });
            });
            records.sort((a, b) => new Date(b.waktuInput || 0) - new Date(a.waktuInput || 0));
            setHistory(records);
            setIsSyncing(false);
          },
          (error) => {
            console.warn("Koneksi log absensi Firestore ditolak atau terputus: ", error);
            setCloudStatus("Gagal (Permission Denied)");
            setHasPermissionError(true);
            setCloudError("Firestore Error: " + error.message);
            setIsSyncing(false);
          }
        );

        // 2. LANGGANAN REAL-TIME DAFTAR GURU
        const unsubscribeTeachers = onSnapshot(teachersCollection, 
          (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            setTeachers(list);
          },
          (error) => {
            console.warn("Koneksi realtime guru Firestore ditolak:", error);
            setCloudStatus("Gagal (Permission Denied)");
            setHasPermissionError(true);
            setCloudError("Firestore Error: " + error.message);
          }
        );

        // 3. LANGGANAN REAL-TIME DAFTAR KELAS
        const unsubscribeClasses = onSnapshot(classesCollection, 
          (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            list.sort((a, b) => a.nama.localeCompare(b.nama));
            setClasses(list);
          },
          (error) => {
            console.warn("Koneksi realtime kelas Firestore ditolak:", error);
            setCloudStatus("Gagal (Permission Denied)");
            setHasPermissionError(true);
            setCloudError("Firestore Error: " + error.message);
          }
        );

        // --- AUTORUN POPULASI TABEL JIKA KOSONG ---
        const autoInitializeFirestoreTables = async () => {
          try {
            // Cek daftar guru
            const teachersSnap = await getDocs(teachersCollection);
            if (teachersSnap.empty) {
              console.log("Menemukan tabel 'daftar_guru' kosong. Membuat dan mengisi data guru awal...");
              for (const t of TEMPLATE_GURU) {
                await addDoc(teachersCollection, t);
              }
            }

            // Cek daftar kelas
            const classesSnap = await getDocs(classesCollection);
            if (classesSnap.empty) {
              console.log("Menemukan tabel 'daftar_kelas' kosong. Membuat dan mengisi data kelas awal...");
              for (const c of TEMPLATE_KELAS) {
                await addDoc(classesCollection, c);
              }
            }

            // Cek log absensi (absen_history)
            const logsSnap = await getDocs(logCollection);
            if (logsSnap.empty) {
              console.log("Menemukan tabel 'absen_history' kosong. Membuat dan mengisi data absensi awal...");
              // Memperbaiki bug referensi timeString -> timeStr yang merusak inisialisasi cloud
              const timeStr = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' }) + " WIB";
              await addDoc(logCollection, {
                nama: "MUHAMMAD LUTFI, S.Pd.",
                nip: "19920815 202012 1 002",
                mapel: "Pemrograman Web & Perangkat Bergerak",
                tipe: "MASUK",
                waktu: timeStr,
                waktuInput: new Date().toISOString(),
                latitude: SCHOOL_LAT,
                longitude: SCHOOL_LNG,
                jarak: "0.0 m",
                statusLokasi: "DI SEKOLAH (VALID)",
                alamat: "Jl. PB. Sudirman No.68, Perdana, Kec. Pare, Kediri, Jawa Timur",
                jurnalKelas: "XI-RPL-1",
                jurnalAktivitas: "Melakukan pengenalan sistem absensi online terintegrasi Google Cloud Firebase Firestore.",
                foto: "",
                uid: DEFAULT_ANONYMOUS_UID
              });
            }
          } catch (e) {
            console.warn("Gagal mempopulasi tabel secara otomatis (Rules Firestore membatasi):", e.message);
            setCloudStatus("Gagal (Permission Denied)");
            setHasPermissionError(true);
            setCloudError("Firestore Rules Error: " + e.message);
          }
        };

        autoInitializeFirestoreTables();

        return () => {
          unsubscribeLogs();
          unsubscribeTeachers();
          unsubscribeClasses();
        };
      }, [user, isCloudConnected]);

      // Set default jurnalClass saat kelas berhasil dimuat agar selalu valid
      useEffect(() => {
        if (classes && classes.length > 0) {
          const exists = classes.some(cls => cls.nama === jurnalClass);
          if (!exists) {
            setJurnalClass(classes[0].nama);
          }
        }
      }, [classes]);

      // Kamera Cleanup
      useEffect(() => {
        if (step !== 'photo') {
          stopCamera();
        }
      }, [step]);

      // --- PROSES LOGIN ---
      const handleLogin = (e) => {
        e.preventDefault();
        setLoginError('');

        if (loginTab === 'guru') {
          if (teachers.length === 0) {
            setLoginError('Belum ada data guru terdaftar di database cloud.');
            return;
          }
          if (inputPassword === 'guru123') {
            const profile = teachers[selectedGuruIndex];
            if (!profile) {
              setLoginError('Guru terpilih tidak valid.');
              return;
            }
            setGuruProfile(profile);
            setUserRole('guru');
            setIsLoggedIn(true);
            localStorage.setItem('absen_session', JSON.stringify({ role: 'guru', profile }));
            showToast(`Selamat datang Kembali, ${profile.nama}!`, 'success');
          } else {
            setLoginError('Kata sandi guru salah. Silakan coba lagi.');
          }
        } else if (loginTab === 'admin') {
          if (adminUsername === 'admin' && inputPassword === 'admin123') {
            setUserRole('admin');
            setIsLoggedIn(true);
            localStorage.setItem('absen_session', JSON.stringify({ role: 'admin' }));
            showToast('Selamat datang Admin SMK Canda Bhirawa!', 'success');
          } else {
            setLoginError('Username atau kata sandi Admin salah.');
          }
        }
        setInputPassword('');
      };

      // --- LOGOUT ---
      const handleLogout = () => {
        localStorage.removeItem('absen_session');
        setIsLoggedIn(false);
        setUserRole(null);
        setGuruProfile(null);
        setStep('welcome');
        setShowHistory(false);
        showToast('Sesi Anda telah berakhir.', 'info');
      };

      // --- PROSES KAMERA ---
      const startCamera = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
              facingMode: "user",
              width: { ideal: 640 },
              height: { ideal: 480 }
            }, 
            audio: false 
          });
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            streamRef.current = stream;
          }
        } catch (err) {
          console.warn("Gagal mengakses kamera: ", err);
          showToast("Kamera tidak dapat diakses. Pastikan izin kamera aktif.", "error");
        }
      };

      const stopCamera = () => {
        if (streamRef.current) {
          streamRef.current.getTracks().forEach(track => track.stop());
          streamRef.current = null;
        }
      };

      const capturePhoto = () => {
        if (videoRef.current) {
          const canvas = document.createElement('canvas');
          canvas.width = videoRef.current.videoWidth || 640;
          canvas.height = videoRef.current.videoHeight || 480;
          const ctx = canvas.getContext('2d');
          
          ctx.drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
          
          ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
          ctx.fillRect(0, canvas.height - 70, canvas.width, 70);
          
          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 14px 'Plus Jakarta Sans', sans-serif";
          ctx.fillText(`Guru: ${guruProfile?.nama}`, 20, canvas.height - 45);
          
          const timeString = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });
          ctx.fillText(`Waktu: ${timeString} WIB`, 20, canvas.height - 25);
          
          if (location) {
            ctx.fillText(`GPS: ${location.latitude.toFixed(6)}, ${location.longitude.toFixed(6)}`, 20, canvas.height - 5);
          } else {
            ctx.fillText(`GPS: Memproses Lokasi...`, 20, canvas.height - 5);
          }

          const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
          setPhotoData(dataUrl);
          stopCamera();
          setStep('location');
          fetchLocation();
        }
      };

      // --- PROSES GPS & GEOLOCATION ---
      const fetchLocation = () => {
        if (isFileProtocol) {
          console.log("Bypass Geolocation karena berjalan di protokol lokal file:///");
          handleSimulateLocation();
          return;
        }

        if (!navigator.geolocation) {
          setLocationStatus("error");
          setAddress("Fitur GPS tidak didukung oleh browser ini.");
          return;
        }

        setLocationStatus("fetching");

        const geoOptions = { 
          enableHighAccuracy: true, 
          timeout: 10000, 
          maximumAge: 0 
        };

        const handleSuccess = (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          setLocation({ latitude: lat, longitude: lng });
          setLocationStatus("success");

          const dist = calculateDistance(lat, lng, SCHOOL_LAT, SCHOOL_LNG);
          setDistance(dist);
          setIsInsideArea(dist <= MAX_DISTANCE_METER);

          fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`)
            .then(res => res.json())
            .then(data => {
              if (data && data.display_name) {
                setAddress(data.display_name);
              } else {
                setAddress(`Koordinat: ${lat.toFixed(6)}, ${lng.toFixed(6)}`);
              }
            })
            .catch(() => {
              setAddress(`Koordinat Berhasil Diperoleh: ${lat.toFixed(6)}, ${lng.toFixed(6)}`);
            });
        };

        const handleError = (error) => {
          console.log("GPS Warning Code " + error.code + ": " + error.message);
          
          if (geoOptions.enableHighAccuracy) {
            geoOptions.enableHighAccuracy = false;
            geoOptions.timeout = 15000;
            navigator.geolocation.getCurrentPosition(handleSuccess, (finalError) => {
              console.log("Percobaan kedua warning:", finalError.message);
              setLocationStatus("error");
              
              if (finalError.code === 1 || finalError.message.includes("permissions policy")) {
                setAddress("Izin GPS diblokir oleh kebijakan Sandbox browser/iframe.");
              } else if (finalError.code === 2) {
                setAddress("Posisi GPS tidak tersedia atau sinyal lemah.");
              } else if (finalError.code === 3) {
                setAddress("Batas waktu pencarian lokasi (timeout) habis.");
              } else {
                setAddress("Gagal mengunci GPS. Silakan coba kembali.");
              }
            }, geoOptions);
          } else {
            setLocationStatus("error");
            if (error.code === 1 || error.message.includes("permissions policy")) {
              setAddress("Izin GPS diblokir oleh kebijakan Sandbox browser/iframe.");
            } else {
              setAddress("Gagal mengunci GPS. Pastikan izin aktif.");
            }
          }
        };

        navigator.geolocation.getCurrentPosition(handleSuccess, handleError, geoOptions);
      };

        const R = 6371e3;
        const phi1 = lat1 * Math.PI / 180;
        const phi2 = lat2 * Math.PI / 180;
        const deltaPhi = (lat2 - lat1) * Math.PI / 180;
        const deltaLambda = (lon2 - lon1) * Math.PI / 180;

        const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                  Math.cos(phi1) * Math.cos(phi2) *
                  Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        return R * c;
      };

                                    </span>
                                  ) : (
                                    <span className="inline-flex items-center gap-1 text-[10px] font-extrabold text-rose-700 bg-rose-100 px-2 py-0.5 rounded-md mt-1">
                                      DI LUAR RADIUS
                                    </span>
                                  )}
                                </div>
                              </div>
                            )}
                          </div>

                          <div className="flex gap-3">
                            <button 
                              onClick={() => { setStep('photo'); startCamera(); }}
                              className="flex-1 bg-slate-100 hover:bg-slate-200 active:scale-95 transition-all text-slate-700 font-bold py-3.5 rounded-2xl text-xs flex items-center justify-center"
                            >
                              Foto Ulang
                            </button>
                            <button 
                              onClick={locationStatus === 'success' ? () => setStep('rekap') : fetchLocation}
                              className={`flex-[2] text-white font-extrabold py-3.5 rounded-2xl text-xs flex items-center justify-center gap-2 active:scale-95 transition-all shadow-md ${
                                locationStatus === 'success' ? 'bg-gradient-to-r from-blue-600 to-indigo-600' : 'bg-amber-500'
                              }`}
                            >
                              Lanjut Isi Jurnal
                            </button>
                          </div>
                        </div>
                      )}

                      {/* 4. FORMULIR JURNAL KINERJA */}
                      {step === 'rekap' && (
                        <div className="bg-white rounded-3xl p-5 shadow-xl border border-slate-100 space-y-4 animate-scaleIn">
                          <div>
                            <h3 className="font-black text-slate-800 text-base">Jurnal Kegiatan Kinerja</h3>
                            <p className="text-xs text-slate-400 mt-0.5">Tuliskan ringkasan materi pelajaran yang Anda sampaikan hari ini.</p>
                          </div>

                          <div className="space-y-4">
                            <div>
                              <label className="block text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">KELAS YANG DIAJAR</label>
                              {classes.length === 0 ? (
                                <div className="text-xs text-slate-500 italic bg-slate-50 border p-3 rounded-xl animate-pulse">
                                  Belum ada kelas terdaftar di cloud. Hubungi Administrator.
                                </div>
                              ) : (
                                <select 
                                  value={jurnalClass}
                                  onChange={(e) => setJurnalClass(e.target.value)}
                                  className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs font-bold text-slate-700 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none"
                                >
                                  {classes.map((cls, index) => (
                                    <option key={cls.id || index} value={cls.nama}>
                                      {cls.nama} {cls.deskripsi ? `(${cls.deskripsi})` : ''}
                                    </option>
                                  ))}
                                </select>
                              )}
                            </div>

                            <div>
                              <label className="block text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">RINGKASAN AKTIVITAS MENGAJAR</label>
                              <textarea 
                                rows="3"
                                value={jurnalActivity}
                                onChange={(e) => setJurnalActivity(e.target.value)}
                                placeholder="Tuliskan materi pelajaran secara ringkas dan detail hari ini..."
                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs font-medium text-slate-700 placeholder-slate-400 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none resize-none leading-relaxed"
                              />
                            </div>
                          </div>

                          <div className="flex gap-3">
                            <button 
                              onClick={() => setStep('location')}
                              disabled={loadingSubmit}
                              className="flex-1 bg-slate-100 hover:bg-slate-200 disabled:opacity-50 transition-all text-slate-700 font-bold py-3.5 rounded-2xl text-xs flex items-center justify-center"
                            >
                              Kembali
                            </button>
                            <button 
                              onClick={submitAbsensi}
                              disabled={loadingSubmit || classes.length === 0}
                              className="flex-[2] bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-extrabold py-3.5 rounded-2xl text-xs shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2"
                            >
                              {loadingSubmit ? "Mengirim..." : "Sahkan Absensi"}
                            </button>
                          </div>
                        </div>
                      )}

                      {/* 5. TANDA TERIMA / RECEIPT */}
                      {step === 'success' && receiptData && (
                        <div className="bg-white rounded-3xl p-5 shadow-xl border border-slate-100 space-y-5 animate-scaleIn relative overflow-hidden">
                          <div className="absolute top-0 right-0 w-24 h-24 bg-emerald-500/5 rounded-full -mr-6 -mt-6"></div>
                          
                          <div className="text-center">
                            <div className="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-3 shadow-md shadow-emerald-100">
                              <svg className="w-8 h-8 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path>
                              </svg>
                            </div>
                            <h3 className="font-black text-slate-800 text-lg">Absensi Berhasil Disahkan!</h3>
                            <p className="text-[11px] text-slate-400 mt-0.5">Slip digital kehadiran telah berhasil diunggah ke cloud database.</p>
                          </div>

                          <div className="bg-slate-50 rounded-2xl p-4 border border-slate-200/60 relative font-mono text-xs text-slate-700 space-y-3.5 shadow-inner">
                            <div className="text-center pb-2 border-b border-dashed border-slate-300">
                              <p className="font-extrabold text-slate-800">SMK CANDA BHIRAWA</p>
                              <p className="text-[9px] text-slate-400">SLIP ABSENSI & JURNAL KINERJA</p>
                            </div>

                            <div className="space-y-1.5 text-[11px]">
                              <div className="flex justify-between">
                                <span className="text-slate-400">GURU:</span>
                                <span className="font-bold text-slate-800 text-right truncate max-w-[180px]">{receiptData.nama}</span>
                              </div>
                              <div className="flex justify-between">
                                <span className="text-slate-400">TANGGAL/WAKTU:</span>
                                <span className="font-bold text-slate-800 text-right">{receiptData.waktu}</span>
                              </div>
                              <div className="flex justify-between">
                                <span className="text-slate-400">TIPE KEHADIRAN:</span>
                                <span className="font-extrabold text-blue-600">{receiptData.tipe}</span>
                              </div>
                              <div className="flex justify-between">
                                <span className="text-slate-400">STATUS PRESENSI:</span>
                                <span className="font-extrabold text-emerald-600">{receiptData.statusLokasi}</span>
                              </div>
                              <div className="flex justify-between">
                                <span className="text-slate-400">JARAK AKURASI:</span>
                                <span className="font-bold text-slate-800">{receiptData.jarak}</span>
                              </div>
                            </div>

                            <div className="pt-2 border-t border-dashed border-slate-300">
                              <p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">AKTIVITAS MENGAJAR:</p>
                              <p className="text-[11px] text-slate-600 italic bg-white p-2.5 rounded-lg border border-slate-200/80 leading-relaxed font-sans">
                                "{receiptData.jurnalAktivitas}"
                              </p>
                            </div>
                          </div>

                          <button 
                            onClick={() => setStep('welcome')}
                            className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-extrabold py-4 rounded-2xl text-xs active:scale-95 transition-all text-center block"
                          >
                            Kembali ke Beranda
                          </button>
                        </div>
                      )}

                    </div>
                  )}

                </main>

                {/* WATERMARK FOOTER GURU */}
                <footer className="absolute bottom-4 left-0 right-0 text-center text-[10px] text-slate-400 font-semibold tracking-wider uppercase select-none">
                  Powered by AbsenGuru Pro • Cloud System
                </footer>

              </div>
            )
          )}

        </div>
      );
    }

    // Render Aplikasi React ke DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
