    // Helper Jarak Haversine
    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3; // meter
      const phi1 = lat1 * Math.PI / 180;
      const phi2 = lat2 * Math.PI / 180;
      const deltaPhi = (lat2 - lat1) * Math.PI / 180;
      const deltaLambda = (lon2 - lon1) * Math.PI / 180;

      const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                Math.cos(phi1) * Math.cos(phi2) *
                Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

                                </div>

                              <div className="flex flex-wrap gap-2 items-center">
                                <span className="bg-slate-100 text-slate-600 font-mono text-[9px] px-2 py-0.5 rounded mr-2">
                                  {absen.idAbsen}
                                </span>
                                <span className={`px-2 py-0.5 rounded-full text-[10px] font-extrabold ${
                                  absen.jenisAbsen === 'Masuk' ? 'bg-emerald-100 text-emerald-800' : 'bg-indigo-100 text-indigo-800'
                                }`}>
                                  🌅 {absen.jenisAbsen}
                                </span>
                                <span className={`px-2 py-0.5 rounded text-[10px] font-extrabold ${
                                  absen.status === 'Tepat Waktu' ? 'bg-teal-100 text-teal-800' :
                                  absen.status === 'Terlambat' ? 'bg-rose-100 text-rose-800' :
                                  'bg-slate-200 text-slate-700'
                                }`}>
                                  {absen.status}
                                </span>
                                <span className={`px-2 py-0.5 rounded-full text-[10px] font-medium ${
                                  absen.lokasiRadius.includes('Dalam') ? 'bg-emerald-50 text-emerald-700' : 'bg-rose-50 text-rose-700'
                                }`}>
                                  {absen.lokasiRadius}
                                </span>
                              </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-4 gap-4 text-xs">
                              <div>
                                <p className="text-slate-400 font-bold uppercase text-[9px]">Waktu Presensi</p>
                                <p className="text-slate-700 mt-0.5">{absen.tanggal} • {absen.waktu} WIB</p>
                              </div>
                              <div>
                                <p className="text-slate-400 font-bold uppercase text-[9px]">Koordinat Posisi GPS</p>
                                <p className="font-mono text-slate-700 mt-0.5">
                                  Lat: {absen.latitude}, Lng: {absen.longitude}
                                </p>
                                <a 
                                  href={`https://www.google.com/maps?q=${absen.latitude},${absen.longitude}`}
                                  target="_blank"
                                  rel="noopener noreferrer"
                                  className="text-indigo-600 hover:underline font-bold text-[10px] block mt-1"
                                >
                                  📍 Buka di Google Maps
                                </a>
                              </div>
                              <div>
                                <p className="text-slate-400 font-bold uppercase text-[9px]">Jenis Absen</p>
                                <p className="text-slate-700 font-semibold mt-0.5">{absen.jenisAbsen || 'Masuk'}</p>
                              </div>
                              <div>
                                <p className="text-slate-400 font-bold uppercase text-[9px]">Tautan Bukti Google Drive</p>
                                <a href={absen.fotoDriveUrl} target="_blank" rel="noopener noreferrer" className="text-blue-600 font-semibold underline mt-0.5 block">Drive File URL</a>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* JURNAL LAPORAN KINERJA */}
                    <div className="pt-4 border-t">
                      <h3 className="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4">📝 Rekap Jurnal Kinerja Harian ({filteredLaporanList.length})</h3>
                      {filteredLaporanList.length === 0 ? (
                        <p className="text-xs text-slate-400 italic">Belum ada laporan kinerja yang dikirimkan hari ini.</p>
                      ) : (
                        <div className="space-y-6">
                          {filteredLaporanList.map((laporan) => (
                            <div key={laporan.id || laporan.idLaporan} className="bg-white border rounded-2xl p-5 shadow-sm space-y-4 animate-fadeIn">
                              <div className="flex justify-between items-start border-b pb-3">
                                <div>
                                  <h4 className="font-bold text-slate-800 text-sm">{laporan.namaGuru}</h4>
                                  <p className="text-slate-400 font-mono text-xs">NIP. {laporan.nip} • Tanggal {laporan.tanggal}</p>
                                </div>
                                <span className="bg-slate-100 text-slate-600 font-mono text-[9px] px-2 py-0.5 rounded">
                                  {laporan.idLaporan}
                                </span>
                              </div>

                              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs pb-3 border-b">
                                <div>
                                  <p className="text-slate-400 font-semibold">Materi / Kelas yang Diajar:</p>
                                  <p className="text-slate-800 font-bold mt-1">{laporan.materiPembelajaran}</p>
                                </div>
                                <div className="flex gap-4">
                                  <div>
                                    <p className="text-slate-400 font-semibold">Siswa Hadir:</p>
                                    <p className="text-slate-800 font-extrabold mt-1 text-sm">{laporan.siswaHadir}</p>
                                  </div>
                                  <div>
                                    <p className="text-slate-400 font-semibold">Siswa Absen/Izin:</p>
                                    <p className="text-slate-800 font-extrabold mt-1 text-sm">{laporan.siswaAbsen}</p>
                                  </div>
                                </div>
                              </div>

                              <div className="text-xs">
                                <p className="text-slate-400 font-semibold">Kendala & Solusi Alternatif:</p>
                                <p className="text-slate-700 italic mt-1 leading-relaxed bg-slate-50 p-3 rounded-xl border border-slate-100">
                                  {laporan.kendalaSolusi}
                                </p>
                              </div>

                              {/* TANDA TANGAN (PRISTINE ORIGINAL LAYOUT) */}
                              <div className="grid grid-cols-2 gap-4 text-xs text-center pt-4 border-t">
                                <div>
                                  <p className="text-slate-500">Guru Pelapor,</p>
                                  <div className="h-14 flex items-center justify-center">
                                    <span className="font-serif italic text-emerald-600 font-bold select-none">Tanda Tangan Digital</span>
                                  </div>
                                  <p className="font-extrabold text-slate-800 underline">{laporan.namaGuru}</p>
                                  <p className="text-[9px] text-slate-500 font-mono">NIP. {laporan.nip}</p>
                                </div>
                                <div>
                                  <p className="text-slate-500">Mengetahui, Kepala Sekolah</p>
                                  <div className="h-14 flex items-center justify-center relative">
                                    <div className="absolute opacity-10 border-2 border-dashed border-blue-600 rounded-full w-12 h-12 flex items-center justify-center rotate-12">
                                      <span className="text-[5px] font-black text-blue-600 text-center leading-none">CB</span>
                                    </div>
                                    <span className="font-serif italic text-blue-600 font-bold select-none">Sah Verifikasi</span>
                                  </div>
                                  <p className="font-extrabold text-slate-800 underline font-bold">SUPRIYADI, S.Pd.</p>
                                  <p className="text-[9px] text-slate-500 font-mono">NIP. 198405122009031002</p>
                                </div>
                              </div>

                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

          </main>

          {/* FOOTER */}
          <footer className="bg-slate-900 text-slate-400 py-6 border-t border-slate-800 mt-12">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between text-xs gap-3">
              <p>© 2026 SMK Canda Bhirawa. Hak Cipta Dilindungi.</p>
              <div className="flex gap-4">
                <span>Database: Google Cloud Firestore</span>
                <span>•</span>
                <span>Security Rule: Active</span>
              </div>
            </div>
          </footer>

        </div>
      );
    }

    // Inisialisasi Rendering React 18 yang aman & modern menggunakan createRoot
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>

</html>
